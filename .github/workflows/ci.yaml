name: CI
permissions:
  contents: read
on:
    push:
    workflow_dispatch:
    pull_request:

jobs:
    check_database:
        name: Check database
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Fetch all branches
              run: |
                CURRENT_BRANCH="$(git branch --show-current)"
                if [ "$CURRENT_BRANCH" = '' ]; then 
                    CURRENT_BRANCH="$GITHUB_HEAD_REF"
                    echo "GITHUB_REF: $GITHUB_REF"
                fi
                echo -------- current branch
                echo "$CURRENT_BRANCH"
                echo --------
                for branch in $(git branch --all | grep '^\s*remotes' | grep -vE "HEAD|$CURRENT_BRANCH"); do
                    echo "branch: $branch"
                    if [[ "$branch" != remotes/pull* ]]; then
                        git branch --track "${branch##*/}" "$branch"
                    fi
                done
                echo --------
                git fetch --all
                # echo --------
                # git checkout "$CURRENT_BRANCH"
                echo --------
                git branch -v
                echo --------

            - uses: oven-sh/setup-bun@v2
              with:
                bun-version: latest

            - run: bun ci

            - name: Get Date
              id: get-date
              run: |
                echo "date=$(/bin/date -u "+%Y%m%d")" >> $GITHUB_OUTPUT

            - name: Restore cached mod archives
              uses: actions/cache/restore@v4
              with:
                path: |
                  build/cache
                key: mod-cache-${{ steps.get-date.outputs.date }}
                restore-keys: |
                  mod-cache-

            - name: Test the stable branch
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: BRANCH=stable bun run test

            - name: Test the testing branch
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: BRANCH=testing bun run test

            - name: Save mod archive cache
              uses: actions/cache/save@v4
              with:
                path: |
                  build/cache
                key: mod-cache-${{ steps.get-date.outputs.date }}
